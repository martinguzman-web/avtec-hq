<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avtec HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{ color-scheme:dark;
  --avtec-brass:#C8A24C; --avtec-brass-soft:#DCC389;
  --color-bg:#0F1A24; --color-bg-elev-1:#16242F; --color-bg-elev-2:#1F3140; --color-bg-navy:#1B2A3A;
  --color-line:rgba(244,242,238,.12); --color-line-strong:rgba(244,242,238,.22); --color-line-brass:rgba(200,162,76,.55);
  --color-text:#F4F2EE; --color-text-muted:#B7B9BD; --color-text-subtle:#80838A;
  --color-success:#5FA67C; --color-warning:#C8A24C; --color-danger:#E2A09A; --color-info:#6E93B0;
  --font-display:"Cormorant Garamond",Georgia,serif; --font-sans:"Inter",system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif; --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace; }
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--color-bg);font-family:var(--font-sans);color:var(--color-text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{height:9px;width:9px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(244,242,238,.16);border-radius:5px}
select.avx{font-family:var(--font-sans);background:var(--color-bg-elev-2);color:var(--color-text);border:1px solid var(--color-line-strong);border-radius:4px;padding:6px 9px;font-size:12.5px;outline:none;cursor:pointer}
select.avx:focus{border-color:var(--avtec-brass)}
.avx-row:hover{background:rgba(255,255,255,.02)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--color-line);background:var(--color-bg-navy);position:sticky;top:0;z-index:10}
.wm{font-weight:600;letter-spacing:.18em;font-size:14px}.wm span{color:var(--avtec-brass);margin:0 1px}
.tab{cursor:pointer;font-size:13px;padding:6px 12px;border-radius:4px;color:var(--color-text-muted);border-bottom:2px solid transparent}
.tab.on{color:var(--avtec-brass);background:rgba(200,162,76,.10);border-bottom-color:var(--avtec-brass)}
.wrap{max-width:1180px;margin:0 auto;padding:26px 28px 80px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--color-bg-elev-1);border:1px solid var(--color-line);border-radius:4px;padding:15px 17px}
.kpi .lab{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--color-text-subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi .val{font-family:var(--font-display);font-size:32px;line-height:1;margin-top:11px;font-weight:600}
.kpi .sub{font-size:11.5px;margin-top:8px;color:var(--color-text-subtle)}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:12px}
.panel{background:var(--color-bg-elev-1);border:1px solid var(--color-line);border-radius:4px;overflow:hidden}
.disp{font-family:var(--font-display)}.mono{font-family:var(--font-mono)}
.empty{padding:18px;font-size:13px;color:var(--color-text-subtle)}
.pill{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:3px;border:1px solid currentColor}
.act{cursor:pointer;font-size:11.5px}
.hd{display:grid;gap:10px;padding:10px 18px;border-bottom:1px solid var(--color-line);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-text-subtle)}
.rw{display:grid;gap:10px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--color-line)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--color-bg-elev-2);border:1px solid var(--color-line-brass);color:var(--color-text);padding:10px 16px;border-radius:8px;font-size:13px;z-index:50;display:none;box-shadow:0 10px 28px rgba(0,0,0,.5)}
</style>
</head>
<body>
<div id="root"><div style="padding:48px;text-align:center;color:#80838A">Loading Avtec HQ…</div></div>
<div class="toast" id="toast"></div>
<script>
const T_AIR="tblIfRcP9in4gHFVz", T_QUOTE="tblckMDAOrlOQeULs", T_INV="tbloUM39whOewqmsV";
const N={ air:{name:"Aircraft",scope:"Scope Summary",client:"Client Name",phase:"Current Phase",eta:"Est Completion",dock:"On Dock Date",total:"Current Total"},
  q:{air:"Aircraft",work:"Work",value:"Value",stage:"Stage"},
  i:{air:"Aircraft",job:"Job",num:"Number",due:"Due",amt:"Amount",status:"Status"} };
const STAGES=["Quoted","Approved","On Dock","In Build","Finishing","Delivery"];
const QSTAGES=["Draft","Sent","Follow-up","Approved","Declined"];
const DANGER="var(--color-danger)",BRASS="var(--avtec-brass)",OK="var(--color-success)",MUTED="var(--color-text-muted)",SUBTLE="var(--color-text-subtle)",WARN="var(--color-warning)";
let DATA={jobs:[],quotes:[],invoices:[]}, TAB="overview";

async function api(p){ const r=await fetch("/api/at",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)}); const d=await r.json(); if(d&&d.error) throw new Error(typeof d.error==="string"?d.error:JSON.stringify(d.error)); return d; }
function cv(rec,name){ const v=rec.fields?rec.fields[name]:undefined; if(v==null)return ""; if(typeof v==="object"){ if(v.name!=null)return v.name; if(Array.isArray(v))return v.map(x=>x&&x.name?x.name:x).join(", "); return ""; } return v; }
async function listTable(t){ const d=await api({action:"list",table:t}); return (d&&d.records)||[]; }
async function loadAll(){
  const [a,q,i]=await Promise.all([listTable(T_AIR),listTable(T_QUOTE),listTable(T_INV)]);
  DATA.jobs=a.map(r=>({id:r.id,aircraft:cv(r,N.air.name)||"—",work:cv(r,N.air.scope),client:cv(r,N.air.client),stage:cv(r,N.air.phase),due:cv(r,N.air.eta),dock:cv(r,N.air.dock),value:Number(cv(r,N.air.total))||0}));
  DATA.quotes=q.map(r=>({id:r.id,ref:cv(r,N.q.air)||"—",work:cv(r,N.q.work),value:Number(cv(r,N.q.value))||0,stage:cv(r,N.q.stage)}));
  DATA.invoices=i.map(r=>({id:r.id,client:cv(r,N.i.air)||"—",job:cv(r,N.i.job),number:cv(r,N.i.num),due:cv(r,N.i.due),amount:Number(cv(r,N.i.amt))||0,status:cv(r,N.i.status)}));
}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.style.display="block";clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",2600);}
function compact(n){n=Number(n||0);if(n>=1e6)return "$"+(n/1e6).toFixed(n>=1e7?0:2).replace(/\.0+$/,"")+"M";if(n>=1e3)return "$"+Math.round(n/1e3)+"K";return "$"+n;}
function today(){const d=new Date();d.setHours(12,0,0,0);return d;}
function days(iso){if(!iso)return 9999;const d=new Date(iso+"T12:00:00");if(isNaN(d))return 9999;return Math.round((d-today())/86400000);}
function fmtDate(iso){if(!iso)return "—";const d=new Date(iso+"T12:00:00");if(isNaN(d))return iso;return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
async function writeBack(table,id,name,val,local){ try{ await api({action:"update",table,recordId:id,fields:{[name]:val}}); local(); toast("Saved to Airtable"); render(); }catch(e){ toast("Save failed — "+(e.message||e)); } }
window.onStage=function(id,v){writeBack(T_AIR,id,N.air.phase,v,()=>{const j=DATA.jobs.find(x=>x.id===id);if(j)j.stage=v;});};
window.onQStage=function(id,v){writeBack(T_QUOTE,id,N.q.stage,v,()=>{const q=DATA.quotes.find(x=>x.id===id);if(q)q.stage=v;});};
window.onPaid=function(id){const v=DATA.invoices.find(x=>x.id===id);if(!v||v.status==="Paid")return;writeBack(T_INV,id,N.i.status,"Paid",()=>{v.status="Paid";});};
window.go=function(t){TAB=t;render();};
function compute(){const s=DATA;const active=s.jobs.filter(j=>j.stage!=="Delivery");const dueWeek=s.jobs.filter(j=>{const d=days(j.due);return d>=0&&d<=7&&j.stage!=="Delivery";});const openQ=s.quotes.filter(q=>q.stage!=="Approved"&&q.stage!=="Declined");const openQVal=openQ.reduce((n,q)=>n+q.value,0);const outstanding=s.invoices.filter(v=>v.status==="Sent"||v.status==="Overdue");const overdue=s.invoices.filter(v=>v.status==="Overdue");return {active,dueWeek,openQ,openQVal,outstanding,overdue,outVal:outstanding.reduce((n,v)=>n+v.amount,0),ovVal:overdue.reduce((n,v)=>n+v.amount,0)};}
function kpiRow(c){const k=[["Open Quote Value",compact(c.openQVal),c.openQ.length+" active quotes",SUBTLE],["Active Projects",String(c.active.length),"in the shop",SUBTLE],["Due This Week",String(c.dueWeek.length),c.dueWeek.length?"within 7 days":"clear",c.dueWeek.length?DANGER:SUBTLE],["Outstanding A/R",compact(c.outVal),c.outstanding.length+" invoices",SUBTLE],["Overdue",compact(c.ovVal),c.overdue.length?c.overdue.length+" past due":"none — good",c.overdue.length?DANGER:OK]];return '<div class="kpis">'+k.map(x=>'<div class="kpi"><div class="lab">'+x[0]+'</div><div class="val">'+x[1]+'</div><div class="sub" style="color:'+x[3]+'">'+x[2]+'</div></div>').join("")+'</div>';}
function overviewView(){const active=DATA.jobs.filter(j=>j.stage!=="Delivery");const due=active.filter(j=>days(j.due)<=10).sort((a,b)=>days(a.due)-days(b.due));let rows=due.map(j=>{const d=days(j.due);const rel=d<0?Math.abs(d)+"d overdue":(d===0?"Today":(d>=9999?"—":"in "+d+"d"));const col=d<2?DANGER:(d<5?BRASS:MUTED);return '<div class="avx-row rw" style="grid-template-columns:1.6fr 1.2fr .7fr 1fr"><div><div class="disp" style="font-size:17px">'+esc(j.aircraft)+'</div><div style="font-size:12px;color:'+SUBTLE+';margin-top:2px">'+esc(j.work)+'</div></div><div style="font-size:12.5px;color:'+MUTED+'">'+esc(j.stage)+'</div><div style="font-size:12.5px;color:'+MUTED+'">'+fmtDate(j.due)+'</div><div style="font-size:12px;font-weight:600;color:'+col+'">'+rel+'</div></div>';}).join("");if(!due.length)rows='<div class="empty">Nothing due in the next 10 days.</div>';return '<div class="eyebrow">Jobs Due Soon</div><div class="panel">'+rows+'</div>';}
function jobsView(){const active=DATA.jobs.filter(j=>j.stage!=="Delivery");let rows=DATA.jobs.map(j=>{const d=days(j.due);const dc=(d<2&&j.stage!=="Delivery")?DANGER:MUTED;const opts=STAGES.map(o=>'<option value="'+o+'"'+(o===j.stage?" selected":"")+'>'+o+'</option>').join("");return '<div class="avx-row rw" style="grid-template-columns:1.5fr 1fr 1.3fr .9fr .8fr"><div><div class="disp" style="font-size:16px">'+esc(j.aircraft)+'</div><div style="font-size:12px;color:'+SUBTLE+';margin-top:2px">'+esc(j.work)+'</div></div><div style="font-size:12.5px;color:'+MUTED+'">'+esc(j.client)+'</div><div><select class="avx" onchange="onStage(\''+j.id+'\',this.value)">'+opts+'</select></div><div style="font-size:12.5px;color:'+dc+'">'+fmtDate(j.due)+'</div><div style="font-size:13px;text-align:right">'+compact(j.value)+'</div></div>';}).join("");if(!DATA.jobs.length)rows='<div class="empty">No aircraft yet.</div>';return '<div class="eyebrow">Active Jobs · '+active.length+'</div><div class="panel"><div class="hd" style="grid-template-columns:1.5fr 1fr 1.3fr .9fr .8fr"><div>Aircraft / Work</div><div>Client</div><div>Stage</div><div>Due</div><div style="text-align:right">Value</div></div>'+rows+'</div>';}
function scheduleView(){const parse=(iso)=>{if(!iso)return null;const d=new Date(iso+"T12:00:00");return isNaN(d)?null:d;};const items=DATA.jobs.map(j=>({j,s:parse(j.dock),e:parse(j.due)})).filter(x=>x.s||x.e);if(!items.length)return '<div class="eyebrow">Schedule · On Dock → Delivery</div><div class="panel"><div class="empty">No on-dock or completion dates yet.</div></div>';let all=[];items.forEach(x=>{if(x.s)all.push(+x.s);if(x.e)all.push(+x.e);});let min=new Date(Math.min(...all)-4*864e5),max=new Date(Math.max(...all)+4*864e5);const span=Math.max(1,(+max-+min)),pct=(d)=>((+d-+min)/span*100);let ticks=[],t=new Date(min);t.setHours(12,0,0,0);for(let i=0;i<70&&+t<=+max;i++){ticks.push(new Date(t));t=new Date(+t+7*864e5);}const tickH=ticks.map(d=>'<div style="position:absolute;left:'+pct(d).toFixed(2)+'%;top:0;bottom:0;border-left:1px solid var(--color-line)"><div style="position:absolute;top:-19px;left:3px;font-size:10px;color:'+SUBTLE+';white-space:nowrap">'+d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+'</div></div>').join("");const tp=pct(today());const todayH=(tp>=0&&tp<=100)?'<div style="position:absolute;left:'+tp.toFixed(2)+'%;top:0;bottom:0;border-left:2px solid var(--avtec-brass);z-index:2"></div><div style="position:absolute;left:'+tp.toFixed(2)+'%;top:-19px;font-size:10px;color:var(--avtec-brass);transform:translateX(3px)">Today</div>':"";const fill={"Quoted":["rgba(110,147,176,.18)","var(--color-info)"],"Approved":["rgba(110,147,176,.20)","var(--color-info)"],"On Dock":["rgba(200,162,76,.20)","var(--avtec-brass)"],"In Build":["rgba(200,162,76,.28)","var(--avtec-brass)"],"Finishing":["rgba(95,166,124,.22)","var(--color-success)"],"Delivery":["rgba(95,166,124,.30)","var(--color-success)"]};items.sort((a,b)=>(+(a.s||a.e))-(+(b.s||b.e)));const rows=items.map(x=>{const s=x.s||x.e,e=x.e||x.s;const l=pct(s),w=Math.max(2,pct(e)-l);const f=fill[x.j.stage]||["rgba(200,162,76,.20)","var(--avtec-brass)"];return '<div style="display:grid;grid-template-columns:180px 1fr;align-items:center;border-bottom:1px solid var(--color-line)"><div style="padding:11px 14px"><div class="disp" style="font-size:15px">'+esc(x.j.aircraft)+'</div><div style="font-size:11px;color:'+SUBTLE+'">'+esc(x.j.stage||"")+'</div></div><div style="position:relative;height:48px;min-width:520px">'+tickH+todayH+'<div title="'+esc(x.j.aircraft)+' · '+fmtDate(x.j.dock)+' → '+fmtDate(x.j.due)+'" style="position:absolute;left:'+l.toFixed(2)+'%;width:'+w.toFixed(2)+'%;top:9px;bottom:9px;background:'+f[0]+';border-left:3px solid '+f[1]+';border-radius:3px;display:flex;align-items:center;padding:0 9px;overflow:hidden;white-space:nowrap;font-size:11.5px;color:var(--color-text)">'+esc(x.j.work||x.j.aircraft)+'</div></div></div>';}).join("");return '<div class="eyebrow">Schedule · On Dock → Delivery</div><div class="panel" style="padding-top:24px;overflow-x:auto">'+rows+'</div>';}
function quotesView(){const c=compute();let rows=DATA.quotes.map(q=>{const opts=QSTAGES.map(o=>'<option value="'+o+'"'+(o===q.stage?" selected":"")+'>'+o+'</option>').join("");return '<div class="avx-row rw" style="grid-template-columns:1.3fr 1.4fr .9fr 1.2fr"><div class="mono" style="font-size:12.5px">'+esc(q.ref)+'</div><div style="font-size:12.5px;color:'+MUTED+'">'+esc(q.work)+'</div><div style="font-size:13px;text-align:right">'+compact(q.value)+'</div><div><select class="avx" onchange="onQStage(\''+q.id+'\',this.value)">'+opts+'</select></div></div>';}).join("");if(!DATA.quotes.length)rows='<div class="empty">No quotes yet.</div>';return '<div class="eyebrow">Quotes · '+compact(c.openQVal)+' open value</div><div class="panel"><div class="hd" style="grid-template-columns:1.3fr 1.4fr .9fr 1.2fr"><div>Reference</div><div>Work</div><div style="text-align:right">Value</div><div>Stage</div></div>'+rows+'</div>';}
function invoicesView(){const c=compute();const stCol={Paid:OK,Overdue:DANGER,Sent:BRASS,Draft:SUBTLE};const draftVal=DATA.invoices.filter(v=>v.status==="Draft").reduce((n,v)=>n+v.amount,0);const paidVal=DATA.invoices.filter(v=>v.status==="Paid").reduce((n,v)=>n+v.amount,0);const tiles=[["Outstanding",compact(c.outVal),BRASS,"var(--color-text)"],["Overdue",compact(c.ovVal),c.ovVal?WARN:SUBTLE,c.ovVal?DANGER:SUBTLE],["Draft",compact(draftVal),SUBTLE,"var(--color-text)"],["Paid (all)",compact(paidVal),OK,OK]];const tilesH='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">'+tiles.map(t=>'<div style="background:var(--color-bg-elev-1);border:1px solid var(--color-line);border-left:3px solid '+t[2]+';border-radius:4px;padding:13px 16px"><div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:'+SUBTLE+'">'+t[0]+'</div><div class="disp" style="font-size:24px;margin-top:7px;color:'+t[3]+'">'+t[1]+'</div></div>').join("")+'</div>';let rows=DATA.invoices.map(v=>{const paid=v.status==="Paid";const d=days(v.due);const dc=(!paid&&d<0)?DANGER:MUTED;return '<div class="avx-row rw" style="grid-template-columns:1.5fr 1fr .8fr .9fr .9fr .9fr"><div><div style="font-size:14px">'+esc(v.client)+'</div><div style="font-size:11.5px;color:'+SUBTLE+';margin-top:2px">'+esc(v.job)+'</div></div><div class="mono" style="font-size:12px;color:'+MUTED+'">'+esc(v.number)+'</div><div style="font-size:12px;color:'+dc+';text-align:right">'+fmtDate(v.due)+'</div><div style="font-size:13px;text-align:right">'+compact(v.amount)+'</div><div style="text-align:center"><span class="pill" style="color:'+(stCol[v.status]||MUTED)+'">'+esc(v.status||"—")+'</span></div><div style="text-align:right"><span class="act" style="color:'+(paid?OK:BRASS)+'" onclick="onPaid(\''+v.id+'\')">'+(paid?"Paid ✓":"Mark paid")+'</span></div></div>';}).join("");if(!DATA.invoices.length)rows='<div class="empty">No invoices yet.</div>';return tilesH+'<div class="panel"><div class="hd" style="grid-template-columns:1.5fr 1fr .8fr .9fr .9fr .9fr"><div>Client / Job</div><div>Invoice</div><div style="text-align:right">Due</div><div style="text-align:right">Amount</div><div style="text-align:center">Status</div><div></div></div>'+rows+'</div>';}
function render(){const c=compute();const tabs=[["overview","Overview"],["jobs","Jobs"],["schedule","Schedule"],["quotes","Quotes"],["invoices","Invoices"]];const body=TAB==="jobs"?jobsView():TAB==="schedule"?scheduleView():TAB==="quotes"?quotesView():TAB==="invoices"?invoicesView():overviewView();const dateStr=today().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});document.getElementById("root").innerHTML='<div class="topbar"><div style="display:flex;align-items:center;gap:34px"><div class="wm">AVTEC <span>|</span> INTERIORS</div><div style="display:flex;gap:6px">'+tabs.map(t=>'<div class="tab '+(TAB===t[0]?"on":"")+'" onclick="go(\''+t[0]+'\')">'+t[1]+'</div>').join("")+'</div></div><div style="font-size:12px;color:'+SUBTLE+';letter-spacing:.04em">'+dateStr+'</div></div><div class="wrap">'+kpiRow(c)+body+'</div>';}
(async function(){try{await loadAll();render();}catch(e){document.getElementById("root").innerHTML='<div style="padding:48px;color:#E2A09A">Could not load: '+esc(e.message||e)+'</div>';}})();
</script>
</body>
</html>
